name: Publish a slot

# Triggered by cron-job.org at each posting time (IST). The trigger only needs to
# fire and return; publishing runs here. See scripts/cron-jobs.md for the exact
# schedule and how to call this from cron-job.org.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which slot to publish"
        required: true
        type: choice
        options:
          - x-1
          - x-2
          - linkedin
          - instagram-1
          - instagram-2

permissions:
  contents: write          # to record publish markers back to the repo

concurrency:
  group: headlinne-publish-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Publish ${{ inputs.target }}
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_CHANNEL_ID_X: ${{ secrets.BUFFER_CHANNEL_ID_X }}
          BUFFER_CHANNEL_ID_LINKEDIN: ${{ secrets.BUFFER_CHANNEL_ID_LINKEDIN }}
          BUFFER_CHANNEL_ID_INSTAGRAM: ${{ secrets.BUFFER_CHANNEL_ID_INSTAGRAM }}
          BUFFER_SCHEDULING_MODE: ${{ vars.BUFFER_SCHEDULING_MODE }}
          PUBLIC_IMAGE_BASE_URL: ${{ vars.PUBLIC_IMAGE_BASE_URL }}
        run: |
          python -m headlinne publish --target ${{ inputs.target }}

      - name: Record publish marker
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ || true
          if git diff --cached --quiet; then
            echo "No marker changes to commit."
          else
            git pull --rebase --autostash || true
            git commit -m "Publish marker ${{ inputs.target }} $(date -u +%Y-%m-%dT%H:%M)" || true
            git push || true
          fi
